services:
  - type: web
    name: deepfake-backend-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: deepfake-redis
          property: connectionString
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_SERVICE_TIMEOUT
        value: 300000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin User
      - key: MAX_FILE_SIZE
        value: 52428800
      - key: VIDEO_RETENTION_HOURS
        value: 12
      - key: CLEANUP_INTERVAL_MINUTES
        value: 60

  - type: worker
    name: deepfake-analysis-worker
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: deepfake-redis
          property: connectionString
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_SERVICE_TIMEOUT
        value: 300000
      - key: JWT_SECRET
        generateValue: true
      - key: ANALYSIS_WORKER_CONCURRENCY
        value: 1
      - key: MAX_FILE_SIZE
        value: 52428800
      - key: VIDEO_RETENTION_HOURS
        value: 12
      - key: CLEANUP_INTERVAL_MINUTES
        value: 60

  - type: redis
    name: deepfake-redis
    plan: starter
    maxmemoryPolicy: noeviction
