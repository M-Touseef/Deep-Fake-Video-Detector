services:
  # ── 1. Flask ML Service (Docker) ─────────────────────────────────────────────
  # Render builds this from the Dockerfile inside "ML Model/" folder.
  # It exposes port $PORT (Render overrides ENV PORT to its own assigned port).
  - type: web
    name: deepfake-ml-service
    runtime: docker
    dockerfilePath: ./ML Model/Dockerfile
    dockerContext: ./ML Model
    plan: standard           # needs ≥512 MB RAM for PyTorch + Grad-CAM
    healthCheckPath: /health
    autoDeploy: true

  # ── 2. Node.js Backend ────────────────────────────────────────────────────────
  - type: web
    name: deepfake-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # ML_SERVICE_HOST is auto-injected from the sibling service hostname.
      # env.js builds the full URL: https://<ML_SERVICE_HOST>/predict
      - key: ML_SERVICE_HOST
        fromService:
          name: deepfake-ml-service
          type: web
          property: host
      # ── Secrets: set these manually in the Render dashboard ──────────────────
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@deepfake.com
    autoDeploy: true
